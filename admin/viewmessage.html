<!DOCTYPE html>
<html>
<head>
  <title>View Message</title>
  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
    }

    h2 {
      color: #38bdf8;
      margin-bottom: 15px;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      color: #cbd5f5;
    }

    .info {
      font-size: 14px;
      margin-bottom: 10px;
      color: #94a3b8;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }
    /* MOBILE STYLING */
@media (max-width: 768px) {
  .message-card {
    flex-direction: column;
    align-items: flex-start;
    max-width: 95%;
  }

  .message-preview {
    max-width: 100%;
    white-space: normal; /* allow multi-line preview */
  }

  .status {
    margin-top: 8px;
  }

  .container { /* for full message page */
    width: 95%;
    padding: 20px;
  }
}
  </style>
</head>
<body>

<div class="container">
  <h2 id="senderName">Loading...</h2>
  <div class="info" id="email"></div>
  <div class="info" id="status"></div>
  <p id="messageContent">Please wait while the message loads...</p>
  <button onclick="goBack()">Back to Inbox</button>
</div>

<script>
window.onload = async () => {
  const id = localStorage.getItem('currentMessageId');
  if (!id) {
    alert("No message selected!");
    window.location.href = 'admin.html';
    return;
  }

  const res = await fetch(`https://drishya-backend-clean.onrender.com/messages`);
  const messages = await res.json();
  const msg = messages.find(m => m.id == id);

  if (!msg) {
    alert("Message not found!");
    window.location.href = 'admin.html';
    return;
  }

  document.getElementById('senderName').innerText = msg.name;
  document.getElementById('email').innerText = "Email: " + msg.email;
  document.getElementById('status').innerText = "Status: " + msg.status;
  document.getElementById('messageContent').innerText = msg.message;

  // Automatically mark as read
  if (msg.status !== "Read") {
    await fetch(`https://drishya-backend-clean.onrender.com/mark-read/${id}`, { method: "PUT" });
  }
};

function goBack() {
  window.location.href = 'admin.html';
}
</script>

</body>
</html>
