<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #1e293b;
      padding: 30px 40px;
      border-radius: 12px;
      text-align: center;
      max-width: 350px;
      width: 100%;
    }

    h2 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    /* Make input boxes uniform */
input[type="text"], input[type="password"] {
  width: 100%;
  padding: 12px 15px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #38bdf8;
  font-size: 16px;
  box-sizing: border-box;
}

/* Make login button match input width */
button {
  width: 100%;           /* same width as inputs */
  padding: 12px 15px;    /* same vertical padding */
  border-radius: 8px;    /* match input corners */
  background: #38bdf8;
  color: black;
  font-weight: bold;
  border: none;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 15px rgba(56,189,248,0.3);
}

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .error {
      color: #f87171;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Admin Login</h2>
  <input type="text" id="username" placeholder="Username" required>
  <input type="password" id="password" placeholder="Password" required>
  <button onclick="login()">Login</button>
  <div class="error" id="errorMsg"></div>
</div>

<script>
function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  // Hardcoded credentials
  const adminUser = "Drishya";
  const adminPass = "1234";

  if(username === adminUser && password === adminPass) {
    // Save session in memory (demo purpose)
    sessionStorage.setItem('isLoggedIn', 'true');
    window.location.href = 'admin.html';
  } else {
    document.getElementById('errorMsg').innerText = "Incorrect username or password!";
  }
}
</script>

</body>
</html>
