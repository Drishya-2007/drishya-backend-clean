<!DOCTYPE html>
<html>
<head>
  <title>Admin Inbox</title>
  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .message-card {
      background: #1e293b;
      padding: 15px;
      margin: 10px auto;
      border-radius: 10px;
      max-width: 600px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.3s;
    }

    .message-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 10px #38bdf8;
    }

    .message-info {
      flex: 1;
      margin-left: 10px;
    }

    .message-sender {
      font-weight: bold;
      font-size: 16px;
      color: #38bdf8;
    }

    .message-preview {
      font-size: 14px;
      color: #cbd5f5;
      margin-top: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 350px;
    }

    .status {
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
    }
    /* MOBILE STYLING */
@media (max-width: 768px) {
  .message-card {
    flex-direction: column;
    align-items: flex-start;
    max-width: 95%;
  }

  .message-preview {
    max-width: 100%;
    white-space: normal; /* allow multi-line preview */
  }

  .status {
    margin-top: 8px;
  }

  .container { /* for full message page */
    width: 95%;
    padding: 20px;
  }
}
  </style>
</head>
<body>

<h1>📩 Messages Inbox</h1>

<div id="messages"></div>
<script>
// 1️⃣ Protect admin page
if(sessionStorage.getItem('isLoggedIn') !== 'true'){
  alert("You must login first!");
  window.location.href = 'login.html';
}

// 2️⃣ Logout button (styled)
const logoutBtn = document.createElement('button');
logoutBtn.innerText = "Logout";
logoutBtn.style.position = "fixed";
logoutBtn.style.top = "20px";
logoutBtn.style.right = "20px";
logoutBtn.style.padding = "10px 20px";
logoutBtn.style.background = "#38bdf8";
logoutBtn.style.color = "black";
logoutBtn.style.border = "none";
logoutBtn.style.borderRadius = "30px";
logoutBtn.style.fontWeight = "bold";
logoutBtn.style.cursor = "pointer";
logoutBtn.style.boxShadow = "0 4px 10px rgba(56,189,248,0.3)";
logoutBtn.style.transition = "0.3s";

logoutBtn.onmouseover = () => {
  logoutBtn.style.transform = "scale(1.05) translateY(-2px)";
  logoutBtn.style.boxShadow = "0 8px 20px rgba(56,189,248,0.3)";
};
logoutBtn.onmouseout = () => {
  logoutBtn.style.transform = "scale(1) translateY(0)";
  logoutBtn.style.boxShadow = "0 4px 10px rgba(56,189,248,0.3)";
};
logoutBtn.onclick = () => {
  sessionStorage.removeItem('isLoggedIn');
  window.location.href = 'login.html';
};

document.body.appendChild(logoutBtn);

// 3️⃣ Load messages
async function loadMessages() {
  try {
    const res = await fetch("https://drishya-backend-clean.onrender.com/messages");
    const data = await res.json();

    const container = document.getElementById("messages");
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = "<p><center>No messages yet</center></p>";
      return;
    }

    data.forEach(msg => {
      const div = document.createElement("div");
      div.classList.add("message-card");

      div.innerHTML = `
        <div class="message-info">
          <div class="message-sender">${msg.name}</div>
          <div class="message-preview">${msg.message}</div>
        </div>
        <div>
          <span class="status">${msg.status}</span>
          <button style="margin-left:10px;" onclick="deleteMessage(event, ${msg.id})">Delete</button>
        </div>
      `;

      // Open full message on click
      div.addEventListener('click', (e) => {
        if(e.target.tagName !== 'BUTTON') {
          localStorage.setItem('currentMessageId', msg.id);
          window.location.href = 'viewmessage.html';
        }
      });

      container.appendChild(div);
    });
  } catch(err) {
    alert("Failed to load messages. Make sure server is running at https://drishya-backend-clean.onrender.com");
    console.error(err);
  }
}

// 4️⃣ Delete message
async function deleteMessage(e, id) {
  e.stopPropagation();
  if(!confirm("Are you sure you want to delete this message?")) return;

  await fetch(`https://drishya-backend-clean.onrender.com/delete/${id}`, { method: "DELETE" });
  loadMessages();
}

// 5️⃣ Call loadMessages
loadMessages();
</script>
</body>
</html>
